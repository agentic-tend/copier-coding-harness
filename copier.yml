# Copier configuration: questionnaire and rendering settings for the coding-harness template.

_subdirectory: template

project_name:
  type: str
  help: Project name used in the generated README and LICENSE-adjacent metadata.

description:
  type: str
  help: One-sentence project description; becomes the boundary sentence of the generated README.
  validator: "{% if not description.endswith('.') %}Use a complete sentence ending with a period.{% endif %}"

author:
  type: str
  help: Author name for the MIT license.

role_bindings:
  type: str
  default: "Exploration agent → ChatGPT; Architecture reviewer → Claude; Execution agent → Codex"
  help: 'Provider bindings for the workflow roles. Pre-filled with a common example; edit to match your tools, or clear it to leave the roles unbound.'

include_notes_local:
  type: bool
  default: true
  help: Generate a private, gitignored notes_local/ directory (with a committed README placeholder). Disable to omit it.
