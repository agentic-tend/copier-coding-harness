# CI for the template repository: renders the template and structurally validates the generated harness.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Render and validate generated harness
        run: uv run --with copier --with pytest --with pyyaml -- pytest tests/
